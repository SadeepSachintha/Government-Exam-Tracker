<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Tracker Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #d4af37;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        h1 span {
            color: var(--accent-color);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 600;
            color: var(--accent-color);
        }

        .recent-section {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .exam-list {
            list-style: none;
        }

        .exam-item {
            padding: 1.2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s ease;
        }

        .exam-item:last-child {
            border-bottom: none;
        }

        .exam-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .exam-name {
            font-weight: 500;
            font-size: 1.1rem;
        }

        .exam-date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Government Exam <span>Tracker</span></h1>
            <p class="subtitle">Live monitoring & notification system status</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-label">Subscribers</p>
                <div class="stat-value" id="sub-count">-</div>
            </div>
            <div class="stat-card">
                <p class="stat-label">Total Exams Tracked</p>
                <div class="stat-value" id="exam-count">-</div>
            </div>
            <div class="stat-card">
                <p class="stat-label">Bot Status</p>
                <div class="stat-value" style="font-size: 1.5rem; color: #4ade80;">Running</div>
            </div>
        </div>

        <div class="recent-section">
            <h2 class="section-title">🕒 Recent Exams Found</h2>
            <ul class="exam-list" id="exam-list">
                <!-- Data will be loaded here -->
            </ul>
        </div>
    </div>

    <script>
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                document.getElementById('sub-count').innerText = data.subscribers;
                document.getElementById('exam-count').innerText = data.total_exams;

                const list = document.getElementById('exam-list');
                list.innerHTML = '';
                data.recent_exams.forEach(exam => {
                    const li = document.createElement('li');
                    li.className = 'exam-item';
                    li.innerHTML = `
                        <div>
                            <div class="exam-name">${exam.name}</div>
                            <div class="exam-date">${new Date(exam.added_at).toLocaleString()}</div>
                        </div>
                        <span class="status-badge">Notified</span>
                    `;
                    list.appendChild(li);
                });
            } catch (err) {
                console.error('Failed to fetch stats:', err);
            }
        }

        updateStats();
        setInterval(updateStats, 30000); // Update every 30 seconds
    </script>
</body>
</html>
